<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Professeurs')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container-fluid px-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-person-workspace"></i> Professeurs</h2>
        <a th:href="@{/professors/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Nouveau Professeur
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover table-striped align-middle">
            <thead>
            <tr><th>#</th><th>Nom complet</th><th>Email</th><th>Filière</th><th class="text-center">Actions</th></tr>
            </thead>
            <tbody>
            <tr th:each="p : ${professors}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.firstName + ' ' + p.lastName}"></td>
                <td th:text="${p.email}"></td>
                <td th:text="${p.filiereName}"></td>
                <td class="text-center">
                    <a th:href="@{/professors/edit/{id}(id=${p.id})}" class="btn btn-warning btn-action">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a sec:authorize="hasRole('ADMIN')"
                       th:href="@{/professors/delete/{id}(id=${p.id})}"
                       class="btn btn-danger btn-action"
                       onclick="return confirm('Confirmer la suppression ?')">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(professors)}">
                <td colspan="5" class="text-center py-4 text-muted">Aucun professeur</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
