<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Tableau de bord')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container-fluid px-4">
    <h2 class="mb-4"><i class="bi bi-speedometer2"></i> Tableau de bord</h2>

    <!-- ===== STAT CARDS ===== -->
    <div class="row g-4 mb-4">
        <div class="col-xl-3 col-md-6">
            <div class="card card-stat bg-primary text-white">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <div class="stat-number" th:text="${stats.totalStudents}">0</div>
                        <div>Total Étudiants</div>
                    </div>
                    <i class="bi bi-people stat-icon"></i>
                </div>
            </div>
        </div>
        <div class="col-xl-3 col-md-6">
            <div class="card card-stat bg-success text-white">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <div class="stat-number" th:text="${stats.activeStudents}">0</div>
                        <div>Actifs</div>
                    </div>
                    <i class="bi bi-check-circle stat-icon"></i>
                </div>
            </div>
        </div>
        <div class="col-xl-3 col-md-6">
            <div class="card card-stat bg-info text-white">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <div class="stat-number" th:text="${stats.graduatedStudents}">0</div>
                        <div>Diplômés</div>
                    </div>
                    <i class="bi bi-award stat-icon"></i>
                </div>
            </div>
        </div>
        <div class="col-xl-3 col-md-6">
            <div class="card card-stat bg-danger text-white">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <div class="stat-number" th:text="${stats.suspendedStudents}">0</div>
                        <div>Suspendus</div>
                    </div>
                    <i class="bi bi-pause-circle stat-icon"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== SECONDARY STATS ===== -->
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card card-stat">
                <div class="card-body text-center">
                    <i class="bi bi-diagram-3 text-primary" style="font-size: 2rem;"></i>
                    <div class="stat-number mt-2" th:text="${stats.totalFilieres}">0</div>
                    <div class="text-muted">Filières</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-stat">
                <div class="card-body text-center">
                    <i class="bi bi-person-workspace text-success" style="font-size: 2rem;"></i>
                    <div class="stat-number mt-2" th:text="${stats.totalProfessors}">0</div>
                    <div class="text-muted">Professeurs</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-stat">
                <div class="card-body text-center">
                    <i class="bi bi-book text-info" style="font-size: 2rem;"></i>
                    <div class="stat-number mt-2" th:text="${stats.totalCourses}">0</div>
                    <div class="text-muted">Modules</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== BREAKDOWN TABLES ===== -->
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-white fw-bold">
                    <i class="bi bi-bar-chart"></i> Étudiants par Filière
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead><tr><th>Filière</th><th class="text-end">Nombre</th></tr></thead>
                        <tbody>
                        <tr th:each="entry : ${stats.studentsPerFiliere}">
                            <td th:text="${entry.key}"></td>
                            <td class="text-end fw-bold" th:text="${entry.value}"></td>
                        </tr>
                        <tr th:if="${#maps.isEmpty(stats.studentsPerFiliere)}">
                            <td colspan="2" class="text-center text-muted">Aucune donnée</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-white fw-bold">
                    <i class="bi bi-bar-chart"></i> Étudiants par Niveau
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead><tr><th>Niveau</th><th class="text-end">Nombre</th></tr></thead>
                        <tbody>
                        <tr th:each="entry : ${stats.studentsPerLevel}">
                            <td th:text="${entry.key}"></td>
                            <td class="text-end fw-bold" th:text="${entry.value}"></td>
                        </tr>
                        <tr th:if="${#maps.isEmpty(stats.studentsPerLevel)}">
                            <td colspan="2" class="text-center text-muted">Aucune donnée</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
