<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Modules')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container-fluid px-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-book"></i> Modules</h2>
        <a th:href="@{/courses/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Nouveau Module
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover table-striped align-middle">
            <thead>
            <tr><th>#</th><th>Titre</th><th>Code</th><th>Crédits</th><th>Professeur</th><th>Filière</th><th class="text-center">Actions</th></tr>
            </thead>
            <tbody>
            <tr th:each="c : ${courses}">
                <td th:text="${c.id}"></td>
                <td th:text="${c.title}"></td>
                <td><span class="badge bg-info" th:text="${c.code}"></span></td>
                <td th:text="${c.credits}"></td>
                <td th:text="${c.professorName ?: 'Non assigné'}"></td>
                <td th:text="${c.filiereName}"></td>
                <td class="text-center">
                    <a th:href="@{/courses/edit/{id}(id=${c.id})}" class="btn btn-warning btn-action">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a sec:authorize="hasRole('ADMIN')"
                       th:href="@{/courses/delete/{id}(id=${c.id})}"
                       class="btn btn-danger btn-action"
                       onclick="return confirm('Confirmer la suppression ?')">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(courses)}">
                <td colspan="7" class="text-center py-4 text-muted">Aucun module</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
