<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Détails Étudiant')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid px-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0"><i class="bi bi-person-badge"></i> Fiche Étudiant</h4>
                    <a th:href="@{/students}" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-arrow-left"></i> Retour
                    </a>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <strong>Prénom :</strong>
                            <p th:text="${student.firstName}"></p>
                        </div>
                        <div class="col-md-6">
                            <strong>Nom :</strong>
                            <p th:text="${student.lastName}"></p>
                        </div>
                        <div class="col-md-6">
                            <strong>CIN :</strong>
                            <p th:text="${student.cin}"></p>
                        </div>
                        <div class="col-md-6">
                            <strong>CNE :</strong>
                            <p th:text="${student.cne}"></p>
                        </div>
                        <div class="col-md-6">
                            <strong>Date de naissance :</strong>
                            <p th:text="${student.dateOfBirth}"></p>
                        </div>
                        <div class="col-md-6">
                            <strong>Email :</strong>
                            <p th:text="${student.email}"></p>
                        </div>
                        <div class="col-md-6">
                            <strong>Téléphone :</strong>
                            <p th:text="${student.phone ?: 'Non renseigné'}"></p>
                        </div>
                        <div class="col-md-6">
                            <strong>Adresse :</strong>
                            <p th:text="${student.address ?: 'Non renseignée'}"></p>
                        </div>
                        <div class="col-md-4">
                            <strong>Filière :</strong>
                            <p th:text="${student.filiereName}"></p>
                        </div>
                        <div class="col-md-4">
                            <strong>Niveau :</strong>
                            <p><span class="badge bg-secondary" th:text="${student.level}"></span></p>
                        </div>
                        <div class="col-md-4">
                            <strong>Statut :</strong>
                            <p>
                                <span class="badge"
                                      th:classappend="${student.status.name() == 'ACTIVE'} ? 'badge-active' :
                                                      (${student.status.name() == 'GRADUATED'} ? 'badge-graduated' : 'badge-suspended')"
                                      th:text="${student.status}"></span>
                            </p>
                        </div>
                        <div class="col-12">
                            <strong>Date d'inscription :</strong>
                            <p th:text="${student.registrationDate}"></p>
                        </div>
                    </div>
                    <div class="mt-3">
                        <a th:href="@{/students/edit/{id}(id=${student.id})}"
                           class="btn btn-warning">
                            <i class="bi bi-pencil"></i> Modifier
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
