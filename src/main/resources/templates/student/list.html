<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Étudiants')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container-fluid px-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-people"></i> Liste des Étudiants</h2>
        <div>
            <a th:href="@{/students/export/csv}" class="btn btn-outline-success me-2">
                <i class="bi bi-file-earmark-csv"></i> Exporter CSV
            </a>
            <a th:href="@{/students/new}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Nouvel Étudiant
            </a>
        </div>
    </div>

    <!-- ===== FILTER BAR ===== -->
    <div class="filter-bar">
        <form th:action="@{/students}" method="get" class="row g-2 align-items-end">
            <div class="col-md-3">
                <label class="form-label small">Recherche (CIN/CNE/Nom)</label>
                <input type="text" name="keyword" class="form-control form-control-sm"
                       th:value="${keyword}" placeholder="Tapez ici..."/>
            </div>
            <div class="col-md-2">
                <label class="form-label small">Filière</label>
                <select name="filiereId" class="form-select form-select-sm">
                    <option value="">Toutes</option>
                    <option th:each="f : ${filieres}" th:value="${f.id}" th:text="${f.name}"
                            th:selected="${f.id == selectedFiliereId}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small">Niveau</label>
                <select name="level" class="form-select form-select-sm">
                    <option value="">Tous</option>
                    <option th:each="l : ${levels}" th:value="${l}" th:text="${l}"
                            th:selected="${l == selectedLevel}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small">Statut</label>
                <select name="status" class="form-select form-select-sm">
                    <option value="">Tous</option>
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                            th:selected="${s == selectedStatus}"></option>
                </select>
            </div>
            <div class="col-md-3 d-flex gap-2">
                <button type="submit" class="btn btn-primary btn-sm">
                    <i class="bi bi-search"></i> Filtrer
                </button>
                <a th:href="@{/students}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-counterclockwise"></i> Réinitialiser
                </a>
            </div>
        </form>
    </div>

    <!-- ===== TABLE ===== -->
    <div class="table-responsive">
        <table class="table table-hover table-striped align-middle">
            <thead>
            <tr>
                <th>#</th>
                <th>Nom complet</th>
                <th>CIN</th>
                <th>CNE</th>
                <th>Email</th>
                <th>Filière</th>
                <th>Niveau</th>
                <th>Statut</th>
                <th class="text-center">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${students.content}">
                <td th:text="${s.id}"></td>
                <td th:text="${s.firstName + ' ' + s.lastName}"></td>
                <td th:text="${s.cin}"></td>
                <td th:text="${s.cne}"></td>
                <td th:text="${s.email}"></td>
                <td th:text="${s.filiereName}"></td>
                <td><span class="badge bg-secondary" th:text="${s.level}"></span></td>
                <td>
                    <span class="badge"
                          th:classappend="${s.status.name() == 'ACTIVE'} ? 'badge-active' :
                                          (${s.status.name() == 'GRADUATED'} ? 'badge-graduated' : 'badge-suspended')"
                          th:text="${s.status}"></span>
                </td>
                <td class="text-center">
                    <a th:href="@{/students/{id}(id=${s.id})}"
                       class="btn btn-info btn-action text-white" title="Voir">
                        <i class="bi bi-eye"></i>
                    </a>
                    <a th:href="@{/students/edit/{id}(id=${s.id})}"
                       class="btn btn-warning btn-action" title="Modifier">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a sec:authorize="hasRole('ADMIN')"
                       th:href="@{/students/delete/{id}(id=${s.id})}"
                       class="btn btn-danger btn-action"
                       onclick="return confirm('Confirmer la suppression ?')" title="Supprimer">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${students.content.isEmpty()}">
                <td colspan="9" class="text-center py-4 text-muted">
                    <i class="bi bi-inbox" style="font-size: 2rem;"></i><br/>
                    Aucun étudiant trouvé
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- ===== PAGINATION ===== -->
    <nav th:if="${students.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${students.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/students(page=${students.number - 1},
                              keyword=${keyword}, filiereId=${selectedFiliereId},
                              level=${selectedLevel}, status=${selectedStatus})}">
                    &laquo;
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, students.totalPages - 1)}"
                th:classappend="${i == students.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/students(page=${i},
                              keyword=${keyword}, filiereId=${selectedFiliereId},
                              level=${selectedLevel}, status=${selectedStatus})}"
                   th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${students.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/students(page=${students.number + 1},
                              keyword=${keyword}, filiereId=${selectedFiliereId},
                              level=${selectedLevel}, status=${selectedStatus})}">
                    &raquo;
                </a>
            </li>
        </ul>
        <p class="text-center text-muted small">
            Page <span th:text="${students.number + 1}"></span> sur
            <span th:text="${students.totalPages}"></span>
            — <span th:text="${students.totalElements}"></span> résultat(s)
        </p>
    </nav>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
