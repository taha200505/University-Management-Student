# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=university-management

# ============================================
# SERVER
# ============================================
server.port=8080
server.error.whitelabel.enabled=false

# ============================================
# DATASOURCE (MySQL)
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/university_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Africa/Casablanca&useUnicode=true&characterEncoding=utf8
spring.datasource.username=university_admin
spring.datasource.password=Univ@2026Secure!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ============================================
# SQL INIT (runs schema.sql + data.sql on first start)
# ============================================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true
spring.sql.init.encoding=UTF-8

# ============================================
# THYMELEAF
# ============================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# Force UTF-8 for HTTP request/response bodies and form posts
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ============================================
# LOGGING
# ============================================
logging.level.root=INFO
logging.level.ma.university.management=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================
# PAGINATION DEFAULTS
# ============================================
spring.data.web.pageable.default-page-size=15
spring.data.web.pageable.max-page-size=100
