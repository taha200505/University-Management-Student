<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Connexion')}"></head>
<body class="bg-light">

<div class="login-container">
    <div class="card shadow">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="bi bi-mortarboard-fill text-primary" style="font-size: 3rem;"></i>
                <h3 class="mt-2">Ecole Nationale des Sciences
                    Appliquées d'Al Hoceima Maroc</h3>
                <p class="text-muted">Système de Gestion Universitaire</p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger">
                <i class="bi bi-exclamation-triangle"></i> Identifiants incorrects
            </div>
            <div th:if="${param.logout}" class="alert alert-info">
                <i class="bi bi-check-circle"></i> Déconnexion réussie
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Nom d'utilisateur</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" id="username" name="username"
                               class="form-control" placeholder="admin" required autofocus/>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Mot de passe</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" id="password" name="password"
                               class="form-control" placeholder="••••••••" required/>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right"></i> Se connecter
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
