<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${isEdit} ? 'Modifier Étudiant' : 'Nouvel Étudiant')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid px-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0">
                        <i class="bi" th:classappend="${isEdit} ? 'bi-pencil-square' : 'bi-plus-circle'"></i>
                        <span th:text="${isEdit} ? 'Modifier l\'étudiant' : 'Nouvel étudiant'"></span>
                    </h4>
                </div>
                <div class="card-body">
                    <form th:action="${isEdit} ? @{/students/edit/{id}(id=${student.id})} : @{/students/new}"
                          th:object="${student}" method="post" novalidate>

                        <div class="row g-3">
                            <!-- Prénom -->
                            <div class="col-md-6">
                                <label class="form-label">Prénom *</label>
                                <input type="text" class="form-control"
                                       th:field="*{firstName}"
                                       th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"/>
                                <div class="invalid-feedback" th:errors="*{firstName}"></div>
                            </div>
                            <!-- Nom -->
                            <div class="col-md-6">
                                <label class="form-label">Nom *</label>
                                <input type="text" class="form-control"
                                       th:field="*{lastName}"
                                       th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"/>
                                <div class="invalid-feedback" th:errors="*{lastName}"></div>
                            </div>
                            <!-- CIN -->
                            <div class="col-md-6">
                                <label class="form-label">CIN *</label>
                                <input type="text" class="form-control" placeholder="AB123456"
                                       th:field="*{cin}"
                                       th:classappend="${#fields.hasErrors('cin')} ? 'is-invalid'"/>
                                <div class="invalid-feedback" th:errors="*{cin}"></div>
                            </div>
                            <!-- CNE -->
                            <div class="col-md-6">
                                <label class="form-label">CNE *</label>
                                <input type="text" class="form-control" placeholder="R123456789"
                                       th:field="*{cne}"
                                       th:classappend="${#fields.hasErrors('cne')} ? 'is-invalid'"/>
                                <div class="invalid-feedback" th:errors="*{cne}"></div>
                            </div>
                            <!-- Date de naissance -->
                            <div class="col-md-6">
                                <label class="form-label">Date de naissance *</label>
                                <input type="date" class="form-control"
                                       th:field="*{dateOfBirth}"
                                       th:classappend="${#fields.hasErrors('dateOfBirth')} ? 'is-invalid'"/>
                                <div class="invalid-feedback" th:errors="*{dateOfBirth}"></div>
                            </div>
                            <!-- Email -->
                            <div class="col-md-6">
                                <label class="form-label">Email *</label>
                                <input type="email" class="form-control"
                                       th:field="*{email}"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"/>
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>
                            <!-- Téléphone -->
                            <div class="col-md-6">
                                <label class="form-label">Téléphone</label>
                                <input type="text" class="form-control" placeholder="+212612345678"
                                       th:field="*{phone}"
                                       th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"/>
                                <div class="invalid-feedback" th:errors="*{phone}"></div>
                            </div>
                            <!-- Adresse -->
                            <div class="col-md-6">
                                <label class="form-label">Adresse</label>
                                <input type="text" class="form-control"
                                       th:field="*{address}"
                                       th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'"/>
                                <div class="invalid-feedback" th:errors="*{address}"></div>
                            </div>
                            <!-- Filière -->
                            <div class="col-md-4">
                                <label class="form-label">Filière *</label>
                                <select class="form-select"
                                        th:field="*{filiereId}"
                                        th:classappend="${#fields.hasErrors('filiereId')} ? 'is-invalid'">
                                    <option value="">-- Choisir --</option>
                                    <option th:each="f : ${filieres}"
                                            th:value="${f.id}" th:text="${f.name}"></option>
                                </select>
                                <div class="invalid-feedback" th:errors="*{filiereId}"></div>
                            </div>
                            <!-- Niveau -->
                            <div class="col-md-4">
                                <label class="form-label">Niveau *</label>
                                <select class="form-select"
                                        th:field="*{level}"
                                        th:classappend="${#fields.hasErrors('level')} ? 'is-invalid'">
                                    <option value="">-- Choisir --</option>
                                    <option th:each="l : ${levels}"
                                            th:value="${l}" th:text="${l}"></option>
                                </select>
                                <div class="invalid-feedback" th:errors="*{level}"></div>
                            </div>
                            <!-- Statut -->
                            <div class="col-md-4">
                                <label class="form-label">Statut *</label>
                                <select class="form-select"
                                        th:field="*{status}"
                                        th:classappend="${#fields.hasErrors('status')} ? 'is-invalid'">
                                    <option value="">-- Choisir --</option>
                                    <option th:each="s : ${statuses}"
                                            th:value="${s}" th:text="${s}"></option>
                                </select>
                                <div class="invalid-feedback" th:errors="*{status}"></div>
                            </div>
                        </div>

                        <div class="mt-4 d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i>
                                <span th:text="${isEdit} ? 'Mettre à jour' : 'Enregistrer'"></span>
                            </button>
                            <a th:href="@{/students}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> Annuler
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
